# Hand-authored labels for the 23 sample PDFs under problem-statement/samples/.
#
# Per-sample we record 3-5 fields that are clearly extractable from the document
# (printed in the body, no inference required). Numeric fields are written as
# decimal strings without thousands separators / currency symbols. Dates are
# ISO-8601. Strings are matched case-insensitively after light normalization
# (whitespace stripped, smart-quotes/em-dashes folded to ASCII, currency and
# thousand-separators stripped on numeric fields).
#
# `pdf_path` is relative to the repo's `problem-statement/samples/` directory.
# `org_slug` is the C1 organization id; `doc_type` is the C1 doc-type id.

samples:
  # -------------------- ironworks-construction --------------------

