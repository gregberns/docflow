scenarioId: 03-missing-required-field
description: >
  Schema-violation outcome from extraction. The extractor stub raises
  LlmSchemaViolation (canonical name SCHEMA_VIOLATION) on every call. Per
  c3-pipeline-spec.md §3.6, extract retries once on LlmSchemaViolation; the
  retry also fails. The orchestrator catches and marks the ProcessingDocument
  FAILED. No Document or WorkflowInstance is materialized. Asserts 1 classify
  audit row + 2 extract audit rows (initial + retry, both with non-null error).
organizationId: pinnacle-legal
inputPdf: pinnacle-legal/invoices/dewey_cheatham_howe_feb_2024.pdf
classification:
  docType: invoice
extraction:
  error: SCHEMA_VIOLATION
expectedEndState:
  document: null
  workflowInstance: null
  events:
    - type: ProcessingStepChanged
      currentStep: TEXT_EXTRACTING
    - type: ProcessingStepChanged
      currentStep: CLASSIFYING
    - type: ProcessingStepChanged
      currentStep: EXTRACTING
    - type: ProcessingStepChanged
      currentStep: FAILED
