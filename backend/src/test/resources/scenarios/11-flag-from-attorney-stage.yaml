scenarioId: 11-flag-from-attorney-stage
description: >
  Flag-from-non-Review-stage roundtrip with origin restoration. Pipeline
  reaches AWAITING_REVIEW, Approve advances to Attorney Approval, Flag
  from Attorney Approval (with comment) returns the doc to Review with
  workflow_origin_stage = "Attorney Approval" and flag_comment recorded.
  Resolve from Review with no type change clears the flag and returns
  the workflow to its origin stage. Asserts final state: currentStage =
  Attorney Approval, currentStatus = AWAITING_APPROVAL,
  workflow_origin_stage = null, flag_comment = null. Verifies that
  LlmExtractor.extract is NOT invoked (no type change → no re-extraction).
  Asserts 1 classify + 1 initial extract = 2 audit rows.
organizationId: pinnacle-legal
inputPdf: pinnacle-legal/invoices/absolutely_legitimate_court_reporting_feb2024.pdf
classification:
  docType: invoice
extraction:
  fields:
    vendor: "Absolutely Legitimate Court Reporting LLC"
    invoiceNumber: "ALCR-2024-0042"
    invoiceDate: "2024-02-08"
    matterNumber: "5511"
    matterName: "Wellington Trust"
    amount: "3450.00"
    billingPeriod: "February 2024"
    paymentTerms: "Net 30"
actions:
  - type: APPROVE
    expectedStatus: 200
  - type: FLAG
    comment: "needs another look from review"
    expectedStatus: 200
  - type: RESOLVE
    expectedStatus: 200
expectedEndState:
  document:
    detectedDocumentType: invoice
    reextractionStatus: NONE
    extractedFieldsContains:
      vendor: "Absolutely Legitimate Court Reporting LLC"
      paymentTerms: "Net 30"
  workflowInstance:
    currentStageId: Attorney Approval
    currentStatus: AWAITING_APPROVAL
    workflowOriginStage: null
    flagComment: null
  events:
    - type: ProcessingStepChanged
      currentStep: TEXT_EXTRACTING
    - type: ProcessingStepChanged
      currentStep: CLASSIFYING
    - type: ProcessingStepChanged
      currentStep: EXTRACTING
    - type: DocumentStateChanged
      currentStage: Review
      currentStatus: AWAITING_REVIEW
    - type: DocumentStateChanged
      action: APPROVE
      currentStage: Attorney Approval
      currentStatus: AWAITING_APPROVAL
    - type: DocumentStateChanged
      action: FLAG
      currentStage: Review
      currentStatus: FLAGGED
    - type: DocumentStateChanged
      action: RESOLVE
      currentStage: Attorney Approval
      currentStatus: AWAITING_APPROVAL
