organizationId: test-legal
id: expense-report
displayName: Expense Report
fields:
  - name: attorneyName
    type: STRING
    required: true
  - name: matterNumber
    type: STRING
    required: true
  - name: totalAmount
    type: DECIMAL
    required: true
  - name: items
    type: ARRAY
    required: true
    itemSchema:
      fields:
        - name: date
          type: DATE
          required: true
        - name: description
          type: STRING
          required: true
        - name: amount
          type: DECIMAL
          required: true
        - name: billable
          type: ENUM
          required: true
          enumValues:
            - "yes"
            - "no"
