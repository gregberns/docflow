organizationId: test-construction
documentTypeId: lien-waiver
stages:
  - id: Review
    displayName: Review
    kind: REVIEW
    canonicalStatus: AWAITING_REVIEW
  - id: Accounting Approval
    displayName: Accounting Approval
    kind: APPROVAL
    canonicalStatus: AWAITING_APPROVAL
    role: accounting
  - id: Filed
    displayName: Filed
    kind: TERMINAL
    canonicalStatus: FILED
  - id: Rejected
    displayName: Rejected
    kind: TERMINAL
    canonicalStatus: REJECTED
transitions:
  - from: Review
    action: APPROVE
    to: Filed
    guard:
      field: waiverType
      op: EQ
      value: unconditional
  - from: Review
    action: APPROVE
    to: Accounting Approval
    guard:
      field: waiverType
      op: NEQ
      value: unconditional
  - from: Review
    action: REJECT
    to: Rejected
  - from: Accounting Approval
    action: APPROVE
    to: Filed
  - from: Accounting Approval
    action: REJECT
    to: Rejected
