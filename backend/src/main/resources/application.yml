spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

docflow:
  llm:
    model-id: "claude-sonnet-4-6"
    api-key: ${ANTHROPIC_API_KEY}
    request-timeout: PT60S
    eval:
      report-path: eval/reports/latest.md
  storage:
    storage-root: ${STORAGE_ROOT}
  database:
    url: ${DB_URL}
    user: ${DB_USER}
    password: ${DB_PASSWORD}
  config:
    seed-on-boot: true
    seed-resource-path: classpath:seed/
