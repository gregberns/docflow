spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      leak-detection-threshold: 30000
      connection-timeout: 10000
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  jpa:
    hibernate:
      ddl-auto: none

docflow:
  llm:
    model-id: "claude-sonnet-4-6"
    api-key: ${ANTHROPIC_API_KEY}
    request-timeout: PT60S
    eval:
      report-path: eval/reports/latest.md
  storage:
    storage-root: ${STORAGE_ROOT}
  database:
    url: ${DB_URL}
    user: ${DB_USER}
    password: ${DB_PASSWORD}
  config:
    seed-on-boot: true
    seed-resource-path: classpath:seed/

---
spring:
  config:
    activate:
      on-profile: dev
docflow:
  config:
    seed-on-boot: true

---
spring:
  config:
    activate:
      on-profile: prod
docflow:
  config:
    seed-on-boot: false
