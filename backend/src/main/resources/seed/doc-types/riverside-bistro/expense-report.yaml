organizationId: riverside-bistro
id: expense-report
displayName: Expense Report
fields:
  - name: employeeName
    type: STRING
    required: true
    layout: half
  - name: department
    type: STRING
    required: true
    layout: half
  - name: submissionDate
    type: DATE
    required: true
    layout: half
  - name: totalAmount
    type: DECIMAL
    required: true
    format: "currency:USD"
    layout: half
  - name: items
    type: ARRAY
    required: true
    itemSchema:
      fields:
        - name: date
          type: DATE
          required: true
        - name: description
          type: STRING
          required: true
        - name: amount
          type: DECIMAL
          required: true
          format: "currency:USD"
        - name: category
          type: ENUM
          required: true
          enumValues:
            - food
            - supplies
            - equipment
            - services
