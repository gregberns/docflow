organizationId: riverside-bistro
id: invoice
displayName: Invoice
fields:
  - name: vendor
    type: STRING
    required: true
  - name: invoiceNumber
    type: STRING
    required: true
    layout: half
  - name: invoiceDate
    type: DATE
    required: true
    layout: half
  - name: dueDate
    type: DATE
    required: true
    layout: half
  - name: paymentTerms
    type: STRING
    required: true
    layout: half
  - name: subtotal
    type: DECIMAL
    required: true
    format: "currency:USD"
    layout: half
  - name: tax
    type: DECIMAL
    required: true
    format: "currency:USD"
    layout: half
  - name: totalAmount
    type: DECIMAL
    required: true
    format: "currency:USD"
  - name: lineItems
    type: ARRAY
    required: true
    itemSchema:
      fields:
        - name: description
          type: STRING
          required: true
        - name: quantity
          type: DECIMAL
          required: true
        - name: unitPrice
          type: DECIMAL
          required: true
          format: "currency:USD"
        - name: total
          type: DECIMAL
          required: true
          format: "currency:USD"
