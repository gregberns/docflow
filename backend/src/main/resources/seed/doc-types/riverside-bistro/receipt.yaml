organizationId: riverside-bistro
id: receipt
displayName: Receipt
fields:
  - name: merchant
    type: STRING
    required: true
  - name: date
    type: DATE
    required: true
  - name: amount
    type: DECIMAL
    required: true
    format: "currency:USD"
  - name: paymentMethod
    type: STRING
    required: true
  - name: category
    type: ENUM
    required: true
    enumValues:
      - food
      - supplies
      - equipment
      - services
