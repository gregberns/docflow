organizationId: ironworks-construction
id: invoice
displayName: Invoice
fields:
  - name: vendor
    type: STRING
    required: true
  - name: invoiceNumber
    type: STRING
    required: true
    layout: half
  - name: invoiceDate
    type: DATE
    required: true
    layout: half
  - name: projectCode
    type: STRING
    required: true
    layout: half
  - name: projectName
    type: STRING
    required: true
    layout: half
  - name: amount
    type: DECIMAL
    required: true
    format: "currency:USD"
    layout: half
  - name: deliveryDate
    type: DATE
    required: true
    layout: half
  - name: paymentTerms
    type: STRING
    required: true
  - name: materials
    type: ARRAY
    required: true
    itemSchema:
      fields:
        - name: item
          type: STRING
          required: true
        - name: quantity
          type: DECIMAL
          required: true
        - name: unitCost
          type: DECIMAL
          required: true
          format: "currency:USD"
